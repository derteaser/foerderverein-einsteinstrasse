name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Pest tests
    steps:
      - name: 📦 Checkout project repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: 📦 Setup PHP + install deps
        uses: ./.github/actions/setup-php-composer

      - name: 🏃‍♂️ Run tests
        run: vendor/bin/pest --ci
