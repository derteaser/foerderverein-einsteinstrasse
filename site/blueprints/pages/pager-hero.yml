title: Hero
icon: bolt

status:
  draft: Entwurf
  listed: Veröffentlicht

options:
  preview: "{{ page.parent.url }}/#{{ page.slug }}"

columns:
  - width: 2/3
    sections:
      content:
        type: fields
        fields:
          headline:
            type: text
            required: true
          buttons:
            type: structure
            fields:
              text:
                type: text
                required: true
              link:
                type: link
                required: true
                options:
                  - page
                  - url
                  - anchor
              target:
                type: toggle
                label: In neuem Fenster öffnen
                text:
                  - "nein"
                  - "ja"
              primary:
                type: toggle
                label: Primärer Button
                text:
                  - "nein"
                  - "ja"
  - width: 1/3
    sections:
      media:
        type: fields
        fields:
          cover:
            type: files
            multiple: false
            layout: cards
            query: page.images
            image:
              ratio: 16/9
            uploads:
              template: image
